name: Deploy to Production

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths: ['static-web-app/**', '!static-web-app/README.md']

permissions:
  id-token: write
  contents: read

env:
  AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
  AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
  AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
  STATIC_WEB_APP_NAME: "swa-kennethheine-com-dkwcwwqm6kfxy"
  RESOURCE_GROUP_NAME: "rg-kennethheine-prod"

jobs:
  # Job for testing (runs before production deployment)
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: 'static-web-app/.nvmrc'
          cache: 'npm'
          cache-dependency-path: 'static-web-app/package-lock.json'

      - name: Install Dependencies
        working-directory: static-web-app
        run: |
          echo "📦 Installing dependencies..."
          npm ci
          echo "✅ Dependencies installed!"

      - name: Run linter
        working-directory: static-web-app
        run: |
          echo "🔍 Running ESLint..."
          npm run lint
          echo "✅ Linting passed!"

      - name: Check formatting
        working-directory: static-web-app
        run: |
          echo "🎨 Checking code formatting..."
          npm run format:check
          echo "✅ Formatting check passed!"

      - name: Run unit tests
        working-directory: static-web-app
        run: |
          echo "🧪 Running unit tests..."
          npm test
          echo "✅ Unit tests passed!"

      - name: Cache Playwright Browsers
        id: playwright-cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('static-web-app/package-lock.json') }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: Install Playwright Browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        working-directory: static-web-app
        run: npx playwright install chromium --with-deps

      - name: Install Playwright System Dependencies
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        working-directory: static-web-app
        run: npx playwright install-deps chromium

      - name: Run E2E tests
        working-directory: static-web-app
        run: |
          echo "🎭 Running Playwright E2E tests..."
          npm run test:e2e
          echo "✅ E2E tests passed!"

      - name: Build application
        working-directory: static-web-app
        run: |
          echo "🏗️ Building Next.js application..."
          npm run build
          echo "✅ Build completed!"

      - name: Validate build output
        working-directory: static-web-app
        run: |
          echo "📄 Validating build output..."
          if [ ! -d "out" ]; then
            echo "❌ Build output directory 'out' not found"
            exit 1
          fi
          
          if [ ! -f "out/index.html" ]; then
            echo "❌ Main index.html not found in build output"
            exit 1
          fi
          
          echo "✅ Build output validated!"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: production-build
          path: static-web-app/out
          retention-days: 1

  # Job for deploying to production (depends on test job)
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: test
    environment: production
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download build artifacts
        uses: actions/download-artifact@v8.0.1
        with:
          name: production-build
          path: static-web-app/out

      - name: Azure Login using OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ env.AZURE_CLIENT_ID }}
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}

      - name: Get Static Web App Deployment Token
        id: swa-token
        run: |
          echo "🔑 Retrieving deployment token..."
          deployment_token=$(az staticwebapp secrets list \
            --name "${{ env.STATIC_WEB_APP_NAME }}" \
            --resource-group "${{ env.RESOURCE_GROUP_NAME }}" \
            --query "properties.apiKey" \
            --output tsv)
          
          if [ -z "$deployment_token" ]; then
            echo "❌ Failed to retrieve deployment token"
            exit 1
          fi
          echo "::add-mask::$deployment_token"
          echo "deployment-token=$deployment_token" >> $GITHUB_OUTPUT
          echo "✅ Deployment token retrieved!"

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ steps.swa-token.outputs.deployment-token }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: "static-web-app/out"
          skip_app_build: true

      - name: Verify Deployment
        run: |
          echo "🔍 Verifying deployment status..."
          swa_details=$(az staticwebapp show \
            --name "${{ env.STATIC_WEB_APP_NAME }}" \
            --resource-group "${{ env.RESOURCE_GROUP_NAME }}" \
            --output json)
          
          default_hostname=$(echo "$swa_details" | jq -r '.defaultHostname')
          echo "🌐 Default URL: https://$default_hostname"
          echo "✅ Deployment verification completed!"

      - name: Create Deployment Summary
        if: always()
        run: |
          cat >> $GITHUB_STEP_SUMMARY << 'EOF'
          ## 🚀 Production Deployment Results
          
          **Deployment Details:**
          - 📍 Static Web App: `${{ env.STATIC_WEB_APP_NAME }}`
          - 📁 App Location: `static-web-app/out`
          - 📅 Deployment Time: $(date -u '+%Y-%m-%d %H:%M:%S UTC')
          - 🔗 Environment: `production`
          
          **Deployment Status:**
          ${{ job.status == 'success' && '✅ **SUCCESS**: Production deployment completed!' || '❌ **FAILED**: Deployment failed. Check logs above.' }}
          EOF
          
          if [ "${{ job.status }}" == "success" ]; then
            swa_details=$(az staticwebapp show \
              --name "${{ env.STATIC_WEB_APP_NAME }}" \
              --resource-group "${{ env.RESOURCE_GROUP_NAME }}" \
              --output json 2>/dev/null || echo '{}')
            
            default_hostname=$(echo "$swa_details" | jq -r '.defaultHostname // "N/A"')
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**🌐 Access Your Website:**" >> $GITHUB_STEP_SUMMARY
            echo "- Production URL: [https://$default_hostname](https://$default_hostname)" >> $GITHUB_STEP_SUMMARY
          fi
